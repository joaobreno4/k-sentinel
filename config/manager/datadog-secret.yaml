# Secret template for Datadog credentials consumed by the k-sentinel manager.
#
# DO NOT commit real values. Fill in the placeholders and apply with:
#
#   kubectl create secret generic datadog-secrets \
#     --from-literal=api-key=<YOUR_DD_API_KEY> \
#     --from-literal=app-key=<YOUR_DD_APP_KEY> \
#     --namespace k-sentinel-system
#
# Or apply this manifest after replacing the placeholders:
#   kubectl apply -f config/manager/datadog-secret.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: datadog-secrets
  namespace: system
  labels:
    app.kubernetes.io/name: k-sentinel
    app.kubernetes.io/managed-by: kustomize
type: Opaque
stringData:
  api-key: "<DD_API_KEY>"
  app-key: "<DD_APP_KEY>"
